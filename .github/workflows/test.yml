name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run lint

      - run: bun run build

      - name: Run tests
        run: timeout --foreground --signal=SIGTERM --kill-after=10 180 bun test --timeout 30000
        env:
          GIT_TERMINAL_PROMPT: "0"
