id: no-unstable-usewebsocket-url
valid:
  # stable memoized binding (the PR #561 fix shape)
  - 'const wsUrl = useMemo(() => getWsUrl(dom), [dom]); const s = useWebSocket(wsUrl, { share: true })'
  # stable identifier
  - 'useWebSocket(wsUrl)'
  # string literal url is value-stable
  - 'useWebSocket("ws://localhost/ws")'
  # inline OPTIONS object is fine — react-use-websocket keeps options in a ref
  - 'useWebSocket(wsUrl, { share: true, filter: () => false })'
  # unrelated hook untouched
  - 'useOther(() => 1)'
invalid:
  # the original reconnect flushSync loop bug
  - 'useWebSocket(() => getWsUrl(dom), { share: true })'
  - 'useWebSocket(() => getWsUrl(dom))'
  - 'useWebSocket(function url() { return getWsUrl(dom) }, { share: true })'
